<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Antibody Wizard - ver 1.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #e6d5bd; font-family: 'Inter', sans-serif; }
        canvas { display: block; }
        
        .control-panel {
            background: rgba(241, 229, 209, 0.3);
            backdrop-filter: blur(15px) saturate(140%);
            -webkit-backdrop-filter: blur(15px) saturate(140%);
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(92, 74, 54, 0.1);
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.4s ease;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .panel-collapsed {
            transform: translateX(calc(100% + 40px));
            opacity: 0;
            pointer-events: none;
        }

        #toggle-btn {
            background: rgba(241, 229, 209, 0.4);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            transition: all 0.3s ease;
            color: #5c4a36;
        }

        #toggle-btn:hover {
            background: rgba(241, 229, 209, 0.7);
            transform: scale(1.1);
        }

        input[type=range] {
            accent-color: #8c7051;
            background: rgba(255, 255, 255, 0.1);
        }

        .control-panel::-webkit-scrollbar {
            width: 4px;
        }
        .control-panel::-webkit-scrollbar-thumb {
            background: rgba(140, 112, 81, 0.2);
            border-radius: 10px;
        }

        .auto-mode-btn {
            transition: all 0.3s ease;
            opacity: 0.5;
        }
        .auto-mode-btn.active {
            opacity: 1;
            color: #E34234;
            transform: scale(1.1);
        }
    </style>
</head>
<body>

    <button id="toggle-btn" class="fixed top-6 right-6 z-20 p-3 rounded-full shadow-lg active:scale-95">
        <svg id="toggle-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
    </button>

    <div id="controls" class="fixed top-6 right-6 w-80 control-panel p-8 z-10 overflow-y-auto max-h-[90vh]">
        <div class="flex flex-col">
            <h1 class="text-xl font-bold text-[#4a3b2b] mb-1">3D Antibody Wizard</h1>
            <p class="text-[10px] font-bold uppercase tracking-widest text-[#8c7051] mb-8 opacity-80">© THE VISUAL HUB 2026</p>
            
            <div class="space-y-6">
                <!-- 1. Geometry Section -->
                <div>
                    <div class="flex justify-between items-center text-[11px] font-black text-[#5c4a36] mb-2 tracking-tighter">
                        <div class="flex items-center gap-2">
                            <label for="hingeAngle">HINGE FLEXIBILITY</label>
                            <button id="autoHinge" class="auto-mode-btn hover:opacity-100" title="Auto Mode">
                                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.1-1.1.5l-.3.5c-.2.5-.1 1 .3 1.3L9 12l-2 3H4l-1 1 3 2 2 3 1-1v-3l3-2 3.5 5.3c.3.4.8.5 1.3.3l.5-.2c.4-.3.6-.7.5-1.2z"/></svg>
                            </button>
                        </div>
                        <span id="hingeVal" class="bg-white/40 px-2 py-0.5 rounded text-[10px]">85°</span>
                    </div>
                    <input type="range" id="hingeAngle" min="60" max="115" value="85" class="w-full h-1 bg-black/10 rounded-lg appearance-none cursor-pointer">
                </div>

                <div>
                    <div class="flex justify-between items-center text-[11px] font-black text-[#5c4a36] mb-2 tracking-tighter">
                        <div class="flex items-center gap-2">
                            <label for="swingAngle">OUT-OF-PLANE WAGGLE</label>
                            <button id="autoSwing" class="auto-mode-btn hover:opacity-100" title="Auto Mode">
                                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.1-1.1.5l-.3.5c-.2.5-.1 1 .3 1.3L9 12l-2 3H4l-1 1 3 2 2 3 1-1v-3l3-2 3.5 5.3c.3.4.8.5 1.3.3l.5-.2c.4-.3.6-.7.5-1.2z"/></svg>
                            </button>
                        </div>
                        <span id="swingVal" class="bg-white/40 px-2 py-0.5 rounded text-[10px]">0°</span>
                    </div>
                    <input type="range" id="swingAngle" min="-25" max="25" value="0" class="w-full h-1 bg-black/10 rounded-lg appearance-none cursor-pointer">
                </div>

                <div>
                    <div class="flex justify-between items-center text-[11px] font-black text-[#5c4a36] mb-2 tracking-tighter">
                        <div class="flex items-center gap-2">
                            <label for="elbowAngle">ELBOW BEND</label>
                            <button id="autoElbow" class="auto-mode-btn hover:opacity-100" title="Auto Mode">
                                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.1-1.1.5l-.3.5c-.2.5-.1 1 .3 1.3L9 12l-2 3H4l-1 1 3 2 2 3 1-1v-3l3-2 3.5 5.3c.3.4.8.5 1.3.3l.5-.2c.4-.3.6-.7.5-1.2z"/></svg>
                            </button>
                        </div>
                        <span id="elbowVal" class="bg-white/40 px-2 py-0.5 rounded text-[10px]">15°</span>
                    </div>
                    <input type="range" id="elbowAngle" min="-40" max="40" value="15" class="w-full h-1 bg-black/10 rounded-lg appearance-none cursor-pointer">
                </div>

                <!-- 2. Thermal Section -->
                <div class="pt-6 border-t border-[#8c7051]/20 space-y-6">
                    <div class="flex items-center justify-between">
                        <span class="text-[11px] font-black text-[#5c4a36]">THERMAL MOTION</span>
                        <label class="relative inline-flex items-center cursor-pointer">
                          <input type="checkbox" id="thermalToggle" class="sr-only peer">
                          <div class="w-8 h-4 bg-black/10 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-3 after:w-3 after:transition-all peer-checked:bg-[#8c7051]"></div>
                        </label>
                    </div>

                    <div>
                        <div class="flex justify-between items-center text-[11px] font-black text-[#5c4a36] mb-2 tracking-tighter">
                            <div class="flex items-center gap-2">
                                <label for="thermalAmp">ENTROPY AMPLITUDE</label>
                                <button id="autoEntropy" class="auto-mode-btn hover:opacity-100" title="Auto Mode">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.1-1.1.5l-.3.5c-.2.5-.1 1 .3 1.3L9 12l-2 3H4l-1 1 3 2 2 3 1-1v-3l3-2 3.5 5.3c.3.4.8.5 1.3.3l.5-.2c.4-.3.6-.7.5-1.2z"/></svg>
                                </button>
                            </div>
                        </div>
                        <input type="range" id="thermalAmp" min="0" max="100" value="30" class="w-full h-1 bg-black/10 rounded-lg appearance-none cursor-pointer">
                    </div>

                    <div class="flex items-center justify-between">
                        <span class="text-[11px] font-black text-[#5c4a36]">AUTO-ROTATE</span>
                        <label class="relative inline-flex items-center cursor-pointer">
                          <input type="checkbox" id="autoRotate" class="sr-only peer" checked>
                          <div class="w-8 h-4 bg-black/10 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-3 after:w-3 after:transition-all peer-checked:bg-[#8c7051]"></div>
                        </label>
                    </div>

                    <div>
                        <div class="flex justify-between text-[11px] font-black text-[#5c4a36] mb-2 tracking-tighter">
                            <label for="rotSpeed">ROTATION SPEED</label>
                        </div>
                        <input type="range" id="rotSpeed" min="1" max="100" value="25" class="w-full h-1 bg-black/10 rounded-lg appearance-none cursor-pointer">
                    </div>
                </div>

                <!-- 3. Camera and Visual Effects Section -->
                <div class="pt-6 border-t border-[#8c7051]/20 space-y-6">
                    <div class="flex items-center justify-between">
                        <span class="text-[11px] font-black text-[#5c4a36]">WILD CAMERA</span>
                        <label class="relative inline-flex items-center cursor-pointer">
                          <input type="checkbox" id="wildCamToggle" class="sr-only peer">
                          <div class="w-8 h-4 bg-black/10 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-3 after:w-3 after:transition-all peer-checked:bg-[#8c7051]"></div>
                        </label>
                    </div>

                    <div>
                        <div class="flex justify-between text-[11px] font-black text-[#5c4a36] mb-2 tracking-tighter">
                            <label for="camAngles">NUMBER OF ANGLES</label>
                            <span id="camAnglesVal" class="bg-white/40 px-2 py-0.5 rounded text-[10px]">4</span>
                        </div>
                        <input type="range" id="camAngles" min="2" max="12" value="4" class="w-full h-1 bg-black/10 rounded-lg appearance-none cursor-pointer">
                    </div>

                    <div>
                        <div class="flex justify-between text-[11px] font-black text-[#5c4a36] mb-2 tracking-tighter">
                            <label for="camSpeed">TRANSITION SPEED</label>
                        </div>
                        <input type="range" id="camSpeed" min="1" max="100" value="30" class="w-full h-1 bg-black/10 rounded-lg appearance-none cursor-pointer">
                    </div>

                    <!-- Relocated Surface Opacity -->
                    <div>
                        <div class="flex justify-between text-[11px] font-black text-[#5c4a36] mb-2 tracking-tighter">
                            <label for="opacity">SURFACE OPACITY</label>
                            <span id="opacityVal" class="bg-white/40 px-2 py-0.5 rounded text-[10px]">45%</span>
                        </div>
                        <input type="range" id="opacity" min="0" max="100" value="45" class="w-full h-1 bg-black/10 rounded-lg appearance-none cursor-pointer">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="canvas-container"></div>

    <script>
        // --- 1. Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xe6d5bd); 
        scene.fog = new THREE.Fog(0xe6d5bd, 45, 120);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 45);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        const orbit = new THREE.OrbitControls(camera, renderer.domElement);
        orbit.enableDamping = true;
        orbit.dampingFactor = 0.05;

        // --- 2. Lighting Setup ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(20, 30, 20);
        scene.add(dirLight);

        const rimLight = new THREE.PointLight(0xffffff, 0.5);
        rimLight.position.set(-20, -10, -20);
        scene.add(rimLight);

        // --- 3. Materials ---
        const surfaceMaterial = new THREE.MeshPhysicalMaterial({
            color: 0xfdf2e9,
            transparent: true,
            opacity: 0.45,
            roughness: 0.15,
            metalness: 0.0,
            clearcoat: 1.0,
            clearcoatRoughness: 0.1,
            side: THREE.FrontSide,
            depthWrite: true,
            transmission: 0.2, 
            thickness: 0.5
        });

        // --- 4. Geometry Helpers ---
        function createCapsuleMesh(radius, length, material) {
            const group = new THREE.Group();
            const cylGeom = new THREE.CylinderGeometry(radius, radius, length, 32);
            group.add(new THREE.Mesh(cylGeom, material));
            
            const sphereGeom = new THREE.SphereGeometry(radius, 32, 32, 0, Math.PI * 2, 0, Math.PI / 2);
            const topCap = new THREE.Mesh(sphereGeom, material);
            topCap.position.y = length / 2;
            group.add(topCap);
            
            const bottomCap = new THREE.Mesh(sphereGeom, material);
            bottomCap.position.y = -length / 2;
            bottomCap.rotation.x = Math.PI;
            group.add(bottomCap);
            
            return group;
        }

        function generateFoldPath(radius, length) {
            const points = [];
            const numStrands = 8;
            for(let i=0; i<numStrands; i++) {
                const yOffset = (i % 2 === 0) ? length/2 * 0.85 : -length/2 * 0.85;
                const angle = (i / numStrands) * Math.PI * 2;
                points.push(new THREE.Vector3(Math.cos(angle) * radius * 0.5, yOffset, Math.sin(angle) * radius * 0.5));
                
                if (i < numStrands - 1) {
                    const nextAngle = ((i+1) / numStrands) * Math.PI * 2;
                    points.push(new THREE.Vector3((Math.cos(angle)+Math.cos(nextAngle))/2 * radius * 0.8, 0, (Math.sin(angle)+Math.sin(nextAngle))/2 * radius * 0.8));
                }
            }
            return points;
        }

        const domainRegistry = []; 

        function createDomain(x, y, z, rotZ, colorHex, isVariable) {
            const domainGroup = new THREE.Group();
            domainGroup.position.set(x, y, z);
            domainGroup.rotation.z = rotZ;

            const radius = isVariable ? 1.5 : 1.4;
            const length = isVariable ? 1.9 : 2.3;

            domainGroup.add(createCapsuleMesh(radius, length, surfaceMaterial));

            const foldPoints = generateFoldPath(radius, length);
            const curve = new THREE.CatmullRomCurve3(foldPoints, true, 'catmullrom', 0.5);
            const tubeGeom = new THREE.TubeGeometry(curve, 64, 0.3, 12, false);
            
            const ribbonMat = new THREE.MeshPhysicalMaterial({ 
                color: colorHex, 
                emissive: colorHex,
                emissiveIntensity: 0.35,
                roughness: 0.1, 
                metalness: 0.5 
            });
            domainGroup.add(new THREE.Mesh(tubeGeom, ribbonMat));

            domainRegistry.push({
                mesh: domainGroup,
                basePos: new THREE.Vector3(x, y, z),
                baseRot: rotZ,
                noiseOffset: Math.random() * 100
            });

            return domainGroup;
        }

        // --- 5. Constructing the Antibody ---
        const mainMolecule = new THREE.Group();
        scene.add(mainMolecule);

        const colors = {
            vh_l: 0x3b70b5, ch1_l: 0xe08236, vl_l: 0x5cb88a, cl_l: 0xe8ce7d,
            vh_r: 0xb84f69, ch1_r: 0x4e8fb5, vl_r: 0xdb9851, cl_r: 0x8e5ba8,
            ch2_l: 0x7da85b, ch3_l: 0xc96565, ch2_r: 0xd19e41, ch3_r: 0x8262a6
        };

        const fcGroup = new THREE.Group();
        mainMolecule.add(fcGroup);
        fcGroup.add(createDomain(-1.2, -8.0, 0, 0.1, colors.ch3_l, false));
        fcGroup.add(createDomain( 1.2, -8.0, 0, -0.1, colors.ch3_r, false));
        fcGroup.add(createDomain(-1.8, -3.5, 0, 0.15, colors.ch2_l, false));
        fcGroup.add(createDomain( 1.8, -3.5, 0, -0.15, colors.ch2_r, false));

        const hingeAnchorL = new THREE.Group();
        const hingeAnchorR = new THREE.Group();
        hingeAnchorL.position.set(-0.5, -0.5, 0);
        hingeAnchorR.position.set( 0.5, -0.5, 0);
        mainMolecule.add(hingeAnchorL, hingeAnchorR);

        const leftFabBase = new THREE.Group();
        hingeAnchorL.add(leftFabBase);
        leftFabBase.add(createDomain(1.0, 2.8, 0, -0.1, colors.ch1_l, false));
        leftFabBase.add(createDomain(-1.4, 2.8, 0,  0.1, colors.cl_l, false));
        const elbowAnchorL = new THREE.Group();
        elbowAnchorL.position.set(-0.2, 5.8, 0);
        leftFabBase.add(elbowAnchorL);
        elbowAnchorL.add(createDomain( 1.0, 2.2, 0,  0.05, colors.vh_l, true));
        elbowAnchorL.add(createDomain(-1.4, 2.2, 0, -0.05, colors.vl_l, true));

        const rightFabBase = new THREE.Group();
        hingeAnchorR.add(rightFabBase);
        rightFabBase.add(createDomain(-1.0, 2.8, 0,  0.1, colors.ch1_r, false));
        rightFabBase.add(createDomain( 1.4, 2.8, 0, -0.1, colors.cl_r, false));
        const elbowAnchorR = new THREE.Group();
        elbowAnchorR.position.set(0.2, 5.8, 0);
        rightFabBase.add(elbowAnchorR);
        elbowAnchorR.add(createDomain(-1.0, 2.2, 0, -0.05, colors.vh_r, true));
        elbowAnchorR.add(createDomain( 1.4, 2.2, 0,  0.05, colors.vl_r, true));

        // --- 6. Controls Logic ---
        const uiHinge = document.getElementById('hingeAngle');
        const uiHingeVal = document.getElementById('hingeVal');
        const uiSwing = document.getElementById('swingAngle');
        const uiSwingVal = document.getElementById('swingVal');
        const uiElbow = document.getElementById('elbowAngle');
        const uiElbowVal = document.getElementById('elbowVal');
        const uiOpacity = document.getElementById('opacity');
        const uiOpacityVal = document.getElementById('opacityVal');
        const uiAutoRot = document.getElementById('autoRotate');
        const uiRotSpeed = document.getElementById('rotSpeed');
        const uiThermal = document.getElementById('thermalToggle');
        const uiThermalAmp = document.getElementById('thermalAmp');
        const uiWildToggle = document.getElementById('wildCamToggle');
        const uiCamAngles = document.getElementById('camAngles');
        const uiCamAnglesVal = document.getElementById('camAnglesVal');
        const uiCamSpeed = document.getElementById('camSpeed');
        const uiPanel = document.getElementById('controls');
        const uiToggle = document.getElementById('toggle-btn');

        const uiAutoHinge = document.getElementById('autoHinge');
        const uiAutoSwing = document.getElementById('autoSwing');
        const uiAutoElbow = document.getElementById('autoElbow');
        const uiAutoEntropy = document.getElementById('autoEntropy');
        
        let hingeAutoActive = false;
        let swingAutoActive = false;
        let elbowAutoActive = false;
        let entropyAutoActive = false;

        let hingePhase = 0;
        let swingPhase = 0;
        let elbowPhase = 0;
        let entropyPhase = 0;

        // Autopilot event listeners
        uiAutoHinge.addEventListener('click', () => {
            hingeAutoActive = !hingeAutoActive;
            uiAutoHinge.classList.toggle('active', hingeAutoActive);
            if (hingeAutoActive) {
                const time = performance.now() * 0.001;
                const min = parseFloat(uiHinge.min), max = parseFloat(uiHinge.max);
                const norm = (parseFloat(uiHinge.value) - min) / (max - min);
                hingePhase = Math.asin(norm * 2 - 1) - (time * 0.8);
            }
        });

        uiAutoSwing.addEventListener('click', () => {
            swingAutoActive = !swingAutoActive;
            uiAutoSwing.classList.toggle('active', swingAutoActive);
            if (swingAutoActive) {
                const time = performance.now() * 0.001;
                const min = parseFloat(uiSwing.min), max = parseFloat(uiSwing.max);
                const norm = (parseFloat(uiSwing.value) - min) / (max - min);
                swingPhase = Math.asin(norm * 2 - 1) - (time * 0.9);
            }
        });

        uiAutoElbow.addEventListener('click', () => {
            elbowAutoActive = !elbowAutoActive;
            uiAutoElbow.classList.toggle('active', elbowAutoActive);
            if (elbowAutoActive) {
                const time = performance.now() * 0.001;
                const min = parseFloat(uiElbow.min), max = parseFloat(uiElbow.max);
                const norm = (parseFloat(uiElbow.value) - min) / (max - min);
                elbowPhase = Math.asin(norm * 2 - 1) - (time * 1.2);
            }
        });

        uiAutoEntropy.addEventListener('click', () => {
            entropyAutoActive = !entropyAutoActive;
            uiAutoEntropy.classList.toggle('active', entropyAutoActive);
            if (entropyAutoActive) {
                const time = performance.now() * 0.001;
                const min = parseFloat(uiThermalAmp.min), max = parseFloat(uiThermalAmp.max);
                const norm = (parseFloat(uiThermalAmp.value) - min) / (max - min);
                entropyPhase = Math.asin(norm * 2 - 1) - (time * 0.5);
                uiThermal.checked = true; 
            }
        });

        // Panel toggle
        let isCollapsed = false;
        uiToggle.addEventListener('click', () => {
            isCollapsed = !isCollapsed;
            uiPanel.classList.toggle('panel-collapsed', isCollapsed);
            uiToggle.innerHTML = isCollapsed ? 
                '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>' :
                '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
        });

        function updateGeometry() {
            const hingeRad = THREE.MathUtils.degToRad(parseFloat(uiHinge.value));
            hingeAnchorL.rotation.z = hingeRad / 2;
            hingeAnchorR.rotation.z = -hingeRad / 2;
            uiHingeVal.innerText = `${Math.round(uiHinge.value)}°`;

            const swingRad = THREE.MathUtils.degToRad(parseFloat(uiSwing.value));
            hingeAnchorL.rotation.x = swingRad;
            hingeAnchorR.rotation.x = -swingRad;
            uiSwingVal.innerText = `${Math.round(uiSwing.value)}°`;

            const elbowRad = THREE.MathUtils.degToRad(parseFloat(uiElbow.value));
            elbowAnchorL.rotation.z = -elbowRad; 
            elbowAnchorR.rotation.z = elbowRad;
            uiElbowVal.innerText = `${Math.round(uiElbow.value)}°`;

            surfaceMaterial.opacity = parseFloat(uiOpacity.value) / 100;
            surfaceMaterial.visible = surfaceMaterial.opacity > 0;
            uiOpacityVal.innerText = `${uiOpacity.value}%`;

            uiCamAnglesVal.innerText = uiCamAngles.value;
        }

        uiHinge.addEventListener('input', updateGeometry);
        uiSwing.addEventListener('input', updateGeometry);
        uiElbow.addEventListener('input', updateGeometry);
        uiOpacity.addEventListener('input', updateGeometry);
        uiCamAngles.addEventListener('input', () => uiCamAnglesVal.innerText = uiCamAngles.value);
        uiCamAngles.addEventListener('change', () => { if (uiWildToggle.checked) startWildCamera(); });

        updateGeometry();

        // --- 7. Camera Logic ---
        let camPosCurve, camTargetCurve;
        let wildCamProgress = 0;
        let currentWaypointCount = 4;

        function startWildCamera() {
            const count = parseInt(uiCamAngles.value);
            currentWaypointCount = count;
            const posPoints = [camera.position.clone()];
            const targetPoints = [orbit.target.clone()];
            const keyShots = [
                new THREE.Vector3(25, 15, 30), new THREE.Vector3(-25, 5, 25),
                new THREE.Vector3(0, -10, 45), new THREE.Vector3(35, 0, 10),
                new THREE.Vector3(0, 40, 5), new THREE.Vector3(-20, -20, 30)
            ];
            const focusTargets = [new THREE.Vector3(0, 0, 0), new THREE.Vector3(0, 5, 0), new THREE.Vector3(0, -8, 0)];

            for (let i = 0; i < count; i++) {
                const randOffset = new THREE.Vector3((Math.random()-0.5)*10, (Math.random()-0.5)*5, (Math.random()-0.5)*10);
                posPoints.push(keyShots[i % keyShots.length].clone().add(randOffset));
                targetPoints.push(focusTargets[i % focusTargets.length].clone());
            }
            camPosCurve = new THREE.CatmullRomCurve3(posPoints, true);
            camTargetCurve = new THREE.CatmullRomCurve3(targetPoints, true);
            wildCamProgress = 0; 
        }

        uiWildToggle.addEventListener('change', () => { if(uiWildToggle.checked) startWildCamera(); });

        // --- 8. Animation Loop ---
        let thermalStrength = 0; 

        function animate() {
            requestAnimationFrame(animate);
            const time = performance.now() * 0.001;

            // Handle Autopilots
            if (hingeAutoActive) {
                const min = parseFloat(uiHinge.min), max = parseFloat(uiHinge.max);
                uiHinge.value = min + (max - min) * (Math.sin(time * 0.8 + hingePhase) * 0.5 + 0.5);
                updateGeometry();
            }
            if (swingAutoActive) {
                const min = parseFloat(uiSwing.min), max = parseFloat(uiSwing.max);
                uiSwing.value = min + (max - min) * (Math.sin(time * 0.9 + swingPhase) * 0.5 + 0.5);
                updateGeometry();
            }
            if (elbowAutoActive) {
                const min = parseFloat(uiElbow.min), max = parseFloat(uiElbow.max);
                uiElbow.value = min + (max - min) * (Math.sin(time * 1.2 + elbowPhase) * 0.5 + 0.5);
                updateGeometry();
            }
            if (entropyAutoActive) {
                const min = parseFloat(uiThermalAmp.min), max = parseFloat(uiThermalAmp.max);
                uiThermalAmp.value = min + (max - min) * (Math.sin(time * 0.5 + entropyPhase) * 0.5 + 0.5);
            }

            // Camera Motion
            if (uiWildToggle.checked && camPosCurve) {
                wildCamProgress += (parseFloat(uiCamSpeed.value) * 0.0001) / currentWaypointCount;
                if (wildCamProgress > 1) wildCamProgress -= 1;
                camera.position.lerp(camPosCurve.getPoint(wildCamProgress), 0.03);
                orbit.target.lerp(camTargetCurve.getPoint(wildCamProgress), 0.03);
            } 
            
            // Auto Rotation
            if (uiAutoRot.checked) {
                mainMolecule.rotation.y += parseFloat(uiRotSpeed.value) / 3000;
            }

            // Thermal Motion (Refined entropy logic)
            const targetStrength = uiThermal.checked ? 1.0 : 0.0;
            thermalStrength += (targetStrength - thermalStrength) * 0.1;

            if (thermalStrength > 0.001) {
                const entropy = parseFloat(uiThermalAmp.value);
                
                // Optimized limits to prevent domain disconnection
                const maxDisplacement = 0.45; 
                const rawAmpPos = (entropy / 166) * thermalStrength;
                const ampPos = Math.min(rawAmpPos, maxDisplacement); 
                const ampRot = (entropy / 200) * thermalStrength;

                domainRegistry.forEach((domain) => {
                    const noise = Math.sin(time * 3 + domain.noiseOffset);
                    const noise2 = Math.cos(time * 2.5 + domain.noiseOffset);
                    
                    domain.mesh.position.x = domain.basePos.x + noise * ampPos;
                    domain.mesh.position.y = domain.basePos.y + noise2 * ampPos;
                    domain.mesh.rotation.z = domain.baseRot + (noise * ampRot * 0.3);
                });
            } else if (thermalStrength < 0.01) {
                domainRegistry.forEach(domain => {
                    domain.mesh.position.copy(domain.basePos);
                    domain.mesh.rotation.z = domain.baseRot;
                });
            }

            orbit.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        window.onload = animate;
    </script>
</body>
</html>
