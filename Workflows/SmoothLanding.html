<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Parachute Simulation - v1.44</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
            user-select: none;
            touch-action: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        
        .panel {
            position: absolute;
            background: rgba(10, 25, 60, 0.85);
            border: 1px solid rgba(65, 105, 225, 0.5);
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            z-index: 10;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #hud { top: 20px; left: 20px; width: 220px; }
        #camera-settings { top: 220px; left: 20px; width: 220px; }
        #weather-settings { bottom: 20px; left: 20px; width: 220px; }
        #controls { top: 20px; right: 20px; width: 280px; }
        #style-settings { bottom: 20px; right: 20px; width: 280px; }

        .panel.collapsed-left { transform: translateX(calc(-100% + 40px)); }
        .panel.collapsed-right { transform: translateX(calc(100% - 40px)); }

        .panel-toggle {
            position: absolute;
            top: 8px;
            width: 28px;
            height: 28px;
            background: rgba(65, 105, 225, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            transition: all 0.2s;
            z-index: 11;
            font-size: 16px;
        }
        .panel-toggle:hover { 
            background: rgba(65, 105, 225, 1);
            border-color: white;
        }

        #hud .panel-toggle, #camera-settings .panel-toggle, #weather-settings .panel-toggle { right: 8px; }
        #controls .panel-toggle, #style-settings .panel-toggle { left: 8px; }

        h2 {
            margin: 0 0 10px 0;
            font-size: 16px;
            color: #4169E1;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid rgba(65, 105, 225, 0.3);
            padding-bottom: 5px;
            padding-right: 35px; 
        }
        
        #controls h2, #style-settings h2 {
            padding-right: 0;
            padding-left: 35px;
            text-align: right;
        }

        .stat-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 14px; }
        .stat-label { color: #aaa; }
        .stat-value { font-weight: bold; font-family: monospace; font-size: 15px; }

        .control-group { margin-bottom: 12px; }
        .control-group label { display: block; font-size: 12px; color: #ccc; margin-bottom: 4px; }
        .control-group input[type="range"] { width: 100%; accent-color: #4169E1; }
        
        select {
            width: 100%;
            padding: 6px;
            background: rgba(10, 25, 60, 0.85);
            color: white;
            border: 1px solid rgba(65, 105, 225, 0.5);
            border-radius: 4px;
            font-family: inherit;
            outline: none;
        }

        .checkbox-group { display: flex; align-items: center; gap: 8px; font-size: 13px; margin-bottom: 8px; cursor: pointer; }
        .val-display { float: right; color: #4169E1; font-weight: bold; }
        .val-display.warning { color: #ff4444; text-shadow: 0 0 8px rgba(255, 0, 0, 0.6); }

        button.action-btn {
            width: 100%;
            padding: 10px;
            background-color: #4169E1;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            transition: background 0.2s;
            margin-top: 10px;
        }
        button.action-btn:hover { background-color: #27408B; }

        .status-FREEFALL { color: #ef4444; } 
        .status-DEPLOYING { color: #f59e0b; } 
        .status-DEPLOYED { color: #10b981; } 
        .status-LANDED { color: #3b82f6; }

        #palette-preview {
            display: flex;
            height: 12px;
            margin-top: 6px;
            border-radius: 4px;
            overflow: hidden;
            border: 1px solid rgba(65, 105, 225, 0.5);
        }
        .palette-color {
            flex-grow: 1;
            height: 100%;
        }

        .shifter-label {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            gap: 8px;
        }
        .shifter-icon {
            color: #ffda44;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { opacity: 0.4; transform: scale(0.9); }
            50% { opacity: 1; transform: scale(1.1); }
            100% { opacity: 0.4; transform: scale(0.9); }
        }
        
        #lbl-turbulence.heavy {
            color: #ff4444 !important;
            font-weight: bold;
            text-shadow: 0 0 4px rgba(255,0,0,0.3);
        }

        .meteo-grid {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        .meteo-btn {
            flex: 1;
            aspect-ratio: 1;
            background: rgba(65, 105, 225, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            cursor: pointer;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            color: white;
        }
        .meteo-btn:hover {
            background: rgba(65, 105, 225, 0.4);
            border-color: white;
        }
        .meteo-btn.active {
            background: rgba(65, 105, 225, 0.8);
            border-color: white;
            box-shadow: 0 0 10px rgba(65, 105, 225, 0.5);
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="hud" class="panel">
        <button class="panel-toggle" onclick="togglePanel('hud', 'left')">📡</button>
        <h2>Telemetry</h2>
        <div class="stat-row"><span class="stat-label">Altitude:</span><span class="stat-value" id="hud-alt">1000 m</span></div>
        <div class="stat-row"><span class="stat-label">Speed:</span><span class="stat-value" id="hud-speed">0 m/s</span></div>
        <div class="stat-row"><span class="stat-label">Descent:</span><span class="stat-value" id="hud-vz">0 m/s</span></div>
        <div class="stat-row"><span class="stat-label">State:</span><span class="stat-value status-FREEFALL" id="hud-state">FREEFALL</span></div>
    </div>

    <div id="camera-settings" class="panel">
        <button class="panel-toggle" onclick="togglePanel('camera-settings', 'left')">📽️</button>
        <h2>Camera Control</h2>
        <label class="checkbox-group"><input type="checkbox" id="cam-auto-rotate" checked> Auto-Rotation</label>
        <div class="control-group">
            <label>Rotation Speed <span id="val-rot-speed" class="val-display">0.30</span></label>
            <input type="range" id="param-rot-speed" min="0" max="2" value="0.3" step="0.05">
        </div>
        <label class="checkbox-group"><input type="checkbox" id="cam-turbulence" checked> <span id="lbl-turbulence">Turbulence</span></label>
        <div class="control-group">
            <label>Sway Intensity <span id="val-shake" class="val-display">1.5</span></label>
            <input type="range" id="param-shake" min="0" max="10" value="1.5" step="0.1">
        </div>
        <button id="btn-reset-cam" class="action-btn">Reset View</button>
    </div>

    <div id="weather-settings" class="panel">
        <button class="panel-toggle" onclick="togglePanel('weather-settings', 'left')">⛈️</button>
        <h2>METEO</h2>
        <div class="meteo-grid">
            <button class="meteo-btn active" onclick="setWeather('normal')" id="btn-weather-normal">☀️</button>
            <button class="meteo-btn" onclick="setWeather('night')" id="btn-weather-night">🌌</button>
            <button class="meteo-btn" onclick="setWeather('blizzard')" id="btn-weather-blizzard">❄️</button>
        </div>
    </div>

    <div id="controls" class="panel">
        <button class="panel-toggle" onclick="togglePanel('controls', 'right')">⚙️</button>
        <h2>Physics</h2>
        <div class="control-group">
            <label>Mass (kg) <span id="val-mass" class="val-display">80</span></label>
            <input type="range" id="param-mass" min="50" max="250" value="80" step="1">
        </div>
        <div class="control-group">
            <label>Deploy Altitude (m) <span id="val-deploy" class="val-display">300</span></label>
            <input type="range" id="param-deploy" min="100" max="800" value="300" step="10">
        </div>
        <div class="control-group">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <label style="margin-bottom:0">Wind X (m/s) <span id="val-windx" class="val-display">5.0</span></label>
                <label class="checkbox-group" style="margin-bottom:0"><input type="checkbox" id="param-auto-wind"></label>
            </div>
            <input type="range" id="param-windx" min="-20" max="20" value="5" step="0.5">
        </div>
        <div class="control-group">
            <label>Time Scale <span id="val-time" class="val-display">1.0x</span></label>
            <input type="range" id="param-time" min="0.1" max="5" value="1" step="0.1">
        </div>
        <button id="btn-restart" class="action-btn">Jump Again</button>
    </div>

    <div id="style-settings" class="panel">
        <button class="panel-toggle" onclick="togglePanel('style-settings', 'right')">🪂</button>
        <h2>Canopy Shape & Style</h2>
        
        <label class="checkbox-group shifter-label">
            <div style="display: flex; align-items: center; gap: 8px;">
                <span class="shifter-icon">✨</span>
                <span>Shape-Shifter</span>
            </div>
            <input type="checkbox" id="param-shifter" style="margin-left: auto;">
        </label>

        <div class="control-group">
            <label>Canopy Shape <span id="val-shape" class="val-display">Hemispherical</span></label>
            <input type="range" id="param-shape" min="0" max="3" value="0" step="1">
        </div>
        
        <div class="control-group">
            <div class="shifter-label" style="margin-bottom: 4px;">
                <label style="margin-bottom: 0;">🌈 Color Palette</label>
                <label class="checkbox-group" style="margin-left: auto; margin-bottom: 0;">
                    <input type="checkbox" id="param-palette-auto">
                </label>
            </div>
            <select id="param-palette">
                <option value="paired12">Rainbow-12</option>
                <option value="paired10">Rainbow-10</option>
                <option value="paired8">Rainbow-8</option>
                <option value="paired6">Rainbow-6</option>
                <option value="set3">Set3</option>
                <option value="oranges">Oranges4</option>
                <option value="blues">Blues4</option>
                <option value="yellows">Yellows4</option>
                <option value="greens">Greens4</option>
                <option value="reds">Reds4</option>
                <option value="purples">Purples4</option>
                <option value="viridis">Viridis</option>
                <option value="plasma">Plasma</option>
            </select>
            <div id="palette-preview"></div>
        </div>
    </div>

    <script>
        const CONFIG = {
            gravity: 9.81,
            airDensity: 1.225,
            startAltitude: 1000,
            freefall: { Cd: 0.4, A: 0.7 },
            parachute: { Cd: 1.5, A: 44.0 }, 
            deployDuration: 2.0,
            steerForce: 150,
            baseMass: 80,
            turbulenceHeightLimit: 60 
        };

        const PALETTES = {
            paired12: ['#a6cee3','#1f78b4','#b2df8a','#33a02c','#fb9a99','#e31a1c','#fdbf6f','#ff7f00','#cab2d6','#6a3d9a','#ffff99','#b15928'],
            paired10: ['#a6cee3','#1f78b4','#b2df8a','#33a02c','#fb9a99','#e31a1c','#fdbf6f','#ff7f00','#cab2d6','#6a3d9a'],
            paired8:  ['#a6cee3','#1f78b4','#b2df8a','#33a02c','#fb9a99','#e31a1c','#fdbf6f','#ff7f00'],
            paired6:  ['#a6cee3','#1f78b4','#b2df8a','#33a02c','#fb9a99','#e31a1c'],
            set3:     ['#8dd3c7','#ffffb3','#bebada','#fb8072','#80b1d3','#fdb462','#b3de69','#fccde5','#d9d9d9','#bc80bd','#ccebc5','#ffed6f'],
            oranges:  ['#feedde','#fdbe85','#fd8d3c','#d94701'],
            blues:    ['#eff3ff','#bdd7e7','#6baed6','#2171b5'],
            yellows:  ['#ffffd4','#fed98e','#fe9929','#cc4c02'],
            greens:   ['#edf8e9','#bae4b3','#74c476','#238b45'],
            reds:     ['#fee5d9','#fcae91','#fb6a4a','#cb181d'],
            purples:  ['#f2f0f7','#cbc9e2','#9e9ac8','#6a51a3'],
            viridis:  ['#440154','#414487','#2a788e','#22a884','#7ad151','#fde725'],
            plasma:   ['#0d0887','#6a00a8','#b12a90','#e16462','#fca636','#f0f921']
        };

        const SHAPE_NAMES = ['Hemispherical', 'Annular', 'Cruciform', 'Ram-Air'];
        const WATER_LEVEL = 18;

        function getTerrainHeight(x, z) {
            let y = Math.sin(x / 1500) * Math.cos(z / 1500) * 250;
            y += Math.sin(x / 500 + z / 600) * 80;
            y += Math.sin(x / 150) * Math.cos(z / 150) * 20;
            const distFromCenter = Math.sqrt(x*x + z*z);
            if (distFromCenter < 800) {
                const falloff = distFromCenter / 800;
                const smooth = falloff * falloff * (3 - 2 * falloff);
                y = y * smooth;
            }
            return y;
        }

        let state = {
            phase: 'FREEFALL',
            position: new THREE.Vector3(0, CONFIG.startAltitude, 0),
            velocity: new THREE.Vector3(0, 0, 0),
            mass: 80,
            deployAltitude: 300,
            wind: new THREE.Vector3(5, 0, 0),
            timeScale: 1.0,
            deployProgress: 0,
            keys: { up: false, down: false, left: false, right: false },
            camRotationActive: true,
            camRotationSpeed: 0.3,
            camTurbulenceActive: true,
            camShakeIntensity: 1.5,
            camShakeSmooth: 1.5,
            turbulencePhase: 0,
            camPhi: Math.PI / 4,
            camTheta: 0,
            camDistance: 25,
            isDragging: false,
            lastMousePos: { x: 0, y: 0 },
            shapeShifterActive: false,
            lastShapeChange: 0,
            currentShapeIndex: 0,
            paletteAutoActive: false,
            lastPaletteChange: 0,
            currentPaletteIndex: 0,
            autoWindActive: false,
            autoWindDir: 1,
            saltoPhase: 0,
            currentSaltoAlpha: 0,
            objTurbulenceOffset: new THREE.Vector3(0, 0, 0),
            objTurbulenceRot: new THREE.Euler(0, 0, 0),
            weather: 'normal'
        };

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); 
        scene.fog = new THREE.FogExp2(0x87CEEB, 0.0004);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 15000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, logarithmicDepthBuffer: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.75);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.85);
        dirLight.position.set(200, 800, 100);
        dirLight.castShadow = true;
        scene.add(dirLight);

        // This light will follow the parachute and provide top-down lighting in dark/snowy modes
        const moonLight = new THREE.PointLight(0x88aaff, 0, 150);
        moonLight.castShadow = false;
        scene.add(moonLight);

        const starGeo = new THREE.BufferGeometry();
        const starPtsCount = 30000; // Refined count
        const starPts = new Float32Array(starPtsCount * 3);
        const starColors = new Float32Array(starPtsCount * 3);
        for(let i=0; i<starPtsCount; i++) {
            const radius = 8000 + Math.random() * 1000;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            starPts[i*3] = radius * Math.sin(phi) * Math.cos(theta);
            starPts[i*3+1] = radius * Math.sin(phi) * Math.sin(theta);
            starPts[i*3+2] = radius * Math.cos(phi);
            const color = new THREE.Color().setHSL(0.6 + Math.random() * 0.1, 0.7, 0.6 + Math.random() * 0.3);
            starColors[i*3] = color.r; starColors[i*3+1] = color.g; starColors[i*3+2] = color.b;
        }
        starGeo.setAttribute('position', new THREE.BufferAttribute(starPts, 3));
        starGeo.setAttribute('color', new THREE.BufferAttribute(starColors, 3));
        const starMat = new THREE.PointsMaterial({ vertexColors: true, size: 2.2, sizeAttenuation: true, transparent: true, opacity: 0.9 });
        const starSystem = new THREE.Points(starGeo, starMat);
        starSystem.visible = false;
        scene.add(starSystem);

        const snowGeo = new THREE.BufferGeometry();
        const snowPtsCount = 60000; // REFINED: Increased Resolution
        const snowPositions = new Float32Array(snowPtsCount * 3);
        const snowVols = new Float32Array(snowPtsCount);
        const snowArea = 120;
        for(let i=0; i<snowPtsCount; i++) {
            snowPositions[i*3] = THREE.MathUtils.randFloatSpread(snowArea);
            snowPositions[i*3+1] = THREE.MathUtils.randFloatSpread(snowArea);
            snowPositions[i*3+2] = THREE.MathUtils.randFloatSpread(snowArea);
            snowVols[i] = 0.4 + Math.random() * 0.6;
        }
        snowGeo.setAttribute('position', new THREE.BufferAttribute(snowPositions, 3));
        const snowMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.12, transparent: true, opacity: 0.7, sizeAttenuation: true });
        const snowSystem = new THREE.Points(snowGeo, snowMat);
        snowSystem.visible = false;
        scene.add(snowSystem);

        const terrainGeo = new THREE.PlaneGeometry(24000, 24000, 400, 400);
        terrainGeo.rotateX(-Math.PI / 2);
        const terrainMat = new THREE.MeshLambertMaterial({ vertexColors: true });
        const terrain = new THREE.Mesh(terrainGeo, terrainMat);
        terrain.receiveShadow = true;
        scene.add(terrain);

        function updateTerrainColors() {
            const pos = terrainGeo.attributes.position;
            const colors = [];
            const colorObj = new THREE.Color();
            for (let i = 0; i < pos.count; i++) {
                const y = getTerrainHeight(pos.getX(i), pos.getZ(i));
                pos.setY(i, y); 
                if (y < WATER_LEVEL + 4) colorObj.setHex(0xe8d69e);
                else if (y < 60) colorObj.setHex(0x557a2b);
                else if (y < 160) colorObj.setHex(0x2d4c1e);
                else if (y < 220) colorObj.setHex(0x6e7b6d);
                else colorObj.setHex(0xffffff);
                colors.push(colorObj.r, colorObj.g, colorObj.b);
            }
            terrainGeo.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
            terrainGeo.computeVertexNormals();
        }
        updateTerrainColors();

        const waterGeo = new THREE.PlaneGeometry(24000, 24000, 100, 100);
        waterGeo.rotateX(-Math.PI / 2);
        const waterMat = new THREE.MeshStandardMaterial({ color: 0x1e90ff, transparent: true, opacity: 0.7, metalness: 0.1, roughness: 0.2 });
        const water = new THREE.Mesh(waterGeo, waterMat);
        water.position.y = WATER_LEVEL; water.receiveShadow = true;
        scene.add(water);

        const playerGroup = new THREE.Group();
        scene.add(playerGroup);

        const heartShape = new THREE.Shape();
        heartShape.moveTo(0, 0); heartShape.bezierCurveTo(0, 0.3, -0.6, 0.6, -0.6, 1.2);
        heartShape.bezierCurveTo(-0.6, 1.8, 0, 1.8, 0, 1.2); heartShape.bezierCurveTo(0, 1.8, 0.6, 1.8, 0.6, 1.2);
        heartShape.bezierCurveTo(0.6, 0.6, 0, 0.3, 0, 0);
        const heartGeo = new THREE.ExtrudeGeometry(heartShape, { depth: 0.4, bevelEnabled: true, bevelSegments: 3, steps: 2, bevelSize: 0.15, bevelThickness: 0.15 });
        const heartMat = new THREE.MeshStandardMaterial({ color: 0xff0000, roughness: 0.4, metalness: 0.3 });
        const heartMesh = new THREE.Mesh(heartGeo, heartMat);
        heartMesh.rotation.z = Math.PI; heartMesh.position.z = 0.2; heartMesh.castShadow = true;
        playerGroup.add(heartMesh);

        const CANOPY_ATTACH_HEIGHT = 5.0;
        const canopyMat = new THREE.MeshStandardMaterial({ color: 0xffffff, side: THREE.DoubleSide, roughness: 0.8 });
        const canopyMesh = new THREE.Mesh(new THREE.BufferGeometry(), canopyMat);
        canopyMesh.position.y = CANOPY_ATTACH_HEIGHT; canopyMesh.scale.setScalar(0.0001);
        playerGroup.add(canopyMesh);

        function generateStripedTexture(paletteName) {
            const colors = PALETTES[paletteName];
            const canvas = document.createElement('canvas'); canvas.width = 1024; canvas.height = 1024;
            const ctx = canvas.getContext('2d');
            const stripeWidth = canvas.width / colors.length;
            for(let i = 0; i < colors.length; i++) { ctx.fillStyle = colors[i]; ctx.fillRect(i * stripeWidth, 0, stripeWidth, canvas.height); }
            const texture = new THREE.CanvasTexture(canvas); texture.wrapS = THREE.RepeatWrapping; texture.wrapT = THREE.RepeatWrapping; texture.repeat.set(2, 1); return texture;
        }
        canopyMat.map = generateStripedTexture('paired12');

        function updateCanopyShape(index) {
            if (canopyMesh.geometry) canopyMesh.geometry.dispose();
            let geo; let anchorPoints = [];
            switch(index) {
                case 0: // Hemispherical
                    geo = new THREE.SphereGeometry(4.5, 32, 16, 0, Math.PI * 2, 0, Math.PI / 2);
                    for(let i=0; i<16; i++) { let a = (i/16)*Math.PI*2; anchorPoints.push(new THREE.Vector3(Math.cos(a)*4.5, 0, Math.sin(a)*4.5)); } break;
                case 1: // Annular
                    const aPts = []; for (let i = 0; i <= 20; i++) { let t = i / 20; let r = 0.8 + t * 3.7; let y = Math.sin(t * Math.PI) * 2.2; aPts.push(new THREE.Vector2(r, y)); }
                    geo = new THREE.LatheGeometry(aPts, 32); 
                    for(let i=0; i<16; i++) { let a = (i/16)*Math.PI*2; anchorPoints.push(new THREE.Vector3(Math.cos(a)*4.5, 0, Math.sin(a)*4.5)); } break;
                case 2: // Cruciform
                    const w = 1.8, l = 4.8; const crossShape = new THREE.Shape(); 
                    crossShape.moveTo(-w,-l); crossShape.lineTo(w,-l); crossShape.lineTo(w,-w); crossShape.lineTo(l,-w); crossShape.lineTo(l,w); crossShape.lineTo(w,w); crossShape.lineTo(w,l); crossShape.lineTo(-w,l); crossShape.lineTo(-w,w); crossShape.lineTo(-l,w); crossShape.lineTo(-l,-w); crossShape.lineTo(-w,-w); crossShape.lineTo(-w,-l);
                    geo = new THREE.ExtrudeGeometry(crossShape, { depth: 0.1, bevelEnabled: true, bevelSegments: 3, steps: 1, bevelSize: 0.1, bevelThickness: 0.1 }); 
                    geo.rotateX(Math.PI / 2); geo.center();
                    const cPos = geo.attributes.position; 
                    for(let i=0; i<cPos.count; i++) { 
                        let x = cPos.getX(i); let z = cPos.getZ(i); 
                        let droop = (x*x + z*z) * 0.12; 
                        cPos.setY(i, cPos.getY(i) - droop + 1.2); 
                    }
                    geo.computeVertexNormals(); 
                    [[w,l],[-w,l],[w,-l],[-w,-l],[l,w],[l,-w],[-l,w],[-l,-w]].forEach(c => { 
                        let d = (c[0]*c[0] + c[1]*c[1]) * 0.12; 
                        anchorPoints.push(new THREE.Vector3(c[0], 1.2 - d, c[1])); 
                    }); break;
                case 3: // Ram-Air
                    geo = new THREE.BoxGeometry(8, 0.5, 4.2, 16, 1, 1); 
                    const pos2 = geo.attributes.position; 
                    for(let i=0; i<pos2.count; i++) { let x = pos2.getX(i); pos2.setY(i, pos2.getY(i) - (x*x)*0.035); }
                    geo.computeVertexNormals(); 
                    for(let i=0; i<5; i++) { 
                        let x = -4 + (i * 2.0); 
                        let archY = -(x*x)*0.035 - 0.25; 
                        for(let j=0; j<4; j++) anchorPoints.push(new THREE.Vector3(x, archY, -2.1 + (j * 1.4))); 
                    } break;
            }
            canopyMesh.geometry = geo; canopyMesh.userData.anchorPoints = anchorPoints;
        }
        updateCanopyShape(0);

        const stringsGeo = new THREE.BufferGeometry();
        const stringLines = new THREE.LineSegments(stringsGeo, new THREE.LineBasicMaterial({ color: 0x4169E1, transparent: true, opacity: 0.8 }));
        playerGroup.add(stringLines);
        
        function updateStrings() {
            if (canopyMesh.scale.x < 0.001) { stringsGeo.setAttribute('position', new THREE.Float32BufferAttribute([], 3)); return; }
            const curHeartScale = heartMesh.scale.x; 
            const attachL = new THREE.Vector3(-0.4 * (curHeartScale/1.5), heartMesh.position.y + 0.8 * (curHeartScale/1.5), 0.1); 
            const attachR = new THREE.Vector3(0.4 * (curHeartScale/1.5), heartMesh.position.y + 0.8 * (curHeartScale/1.5), 0.1);
            const pts = []; const anchors = canopyMesh.userData.anchorPoints || [];
            canopyMesh.updateMatrix();
            const canopyWorldMatrix = canopyMesh.matrix;
            for(let i = 0; i < anchors.length; i++) {
                const rimPos = anchors[i].clone().applyMatrix4(canopyWorldMatrix);
                const anchor = (anchors[i].x < -0.01) ? attachL : ((anchors[i].x > 0.01) ? attachR : ((i % 2 === 0) ? attachL : attachR));
                pts.push(anchor.x, anchor.y, anchor.z, rimPos.x, rimPos.y, rimPos.z);
            }
            stringsGeo.setAttribute('position', new THREE.Float32BufferAttribute(pts, 3));
            stringsGeo.attributes.position.needsUpdate = true;
        }

        function calculateDrag(velocity, wind, currentCd, currentArea) {
            const airVel = new THREE.Vector3().subVectors(velocity, wind); const speed = airVel.length();
            if (speed < 0.01) return new THREE.Vector3(0,0,0);
            return airVel.clone().normalize().multiplyScalar(-0.5 * CONFIG.airDensity * currentCd * currentArea * speed * speed);
        }

        function physicsStep(dt) {
            if (state.phase === 'LANDED') return;
            let cd = CONFIG.freefall.Cd, area = CONFIG.freefall.A;
            if (state.phase === 'DEPLOYING') {
                state.deployProgress += dt / CONFIG.deployDuration;
                if (state.deployProgress >= 1.0) { state.phase = 'DEPLOYED'; updateHUDState(); }
                const ease = 1 - Math.pow(1 - Math.min(state.deployProgress, 1.0), 3);
                cd = THREE.MathUtils.lerp(CONFIG.freefall.Cd, CONFIG.parachute.Cd, ease);
                area = THREE.MathUtils.lerp(CONFIG.freefall.A, CONFIG.parachute.A, ease);
                canopyMesh.scale.setScalar(ease); canopyMesh.visible = true; stringLines.visible = true; 
            } else if (state.phase === 'DEPLOYED') { cd = CONFIG.parachute.Cd; area = CONFIG.parachute.A; canopyMesh.scale.setScalar(1.0); } else { canopyMesh.visible = false; stringLines.visible = false; }
            const forces = new THREE.Vector3(0, -state.mass * CONFIG.gravity, 0);
            forces.add(calculateDrag(state.velocity, state.wind, cd, area));
            if (state.keys.up) forces.z -= CONFIG.steerForce; if (state.keys.down) forces.z += CONFIG.steerForce;
            if (state.keys.left) forces.x -= CONFIG.steerForce; if (state.keys.right) forces.x += CONFIG.steerForce;
            state.velocity.addScaledVector(forces.divideScalar(state.mass), dt); state.position.addScaledVector(state.velocity, dt);
            if (state.phase === 'FREEFALL' && state.position.y <= state.deployAltitude) { state.phase = 'DEPLOYING'; updateHUDState(); }
            const groundY = Math.max(getTerrainHeight(state.position.x, state.position.z), WATER_LEVEL);
            const bottomOffset = Math.abs(heartMesh.position.y);
            if (state.position.y <= groundY + bottomOffset) { state.position.y = groundY + bottomOffset; state.velocity.set(0, 0, 0); state.phase = 'LANDED'; updateHUDState(); canopyMesh.visible = false; stringLines.visible = false; }
        }

        function togglePanel(panelId, side) {
            const panel = document.getElementById(panelId);
            const className = side === 'left' ? 'collapsed-left' : 'collapsed-right';
            panel.classList.toggle(className);
        }

        function setWeather(mode) {
            state.weather = mode;
            document.querySelectorAll('.meteo-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('btn-weather-' + mode).classList.add('active');

            if (mode === 'normal') {
                scene.background.setHex(0x87CEEB);
                scene.fog.color.setHex(0x87CEEB);
                scene.fog.density = 0.0004;
                ambientLight.intensity = 0.75;
                dirLight.intensity = 0.85;
                dirLight.position.set(200, 800, 100);
                waterMat.color.setHex(0x1e90ff);
                snowSystem.visible = false;
                starSystem.visible = false;
                moonLight.intensity = 0;
            } else if (mode === 'night') {
                scene.background.setHex(0x050812);
                scene.fog.color.setHex(0x050812);
                scene.fog.density = 0.0007;
                ambientLight.intensity = 0.15;
                dirLight.intensity = 0.1;
                dirLight.position.set(-800, 1000, -200);
                waterMat.color.setHex(0x020210);
                snowSystem.visible = false;
                starSystem.visible = true;
                moonLight.intensity = 1.5; // Added lighting source from top
            } else if (mode === 'blizzard') {
                scene.background.setHex(0xc0cedb);
                scene.fog.color.setHex(0xc0cedb);
                scene.fog.density = 0.003; // decrease this to Increase visibility of the landing surface
                ambientLight.intensity = 0.7;
                dirLight.intensity = 0.1;
                waterMat.color.setHex(0x99aabb);
                snowSystem.visible = true;
                starSystem.visible = false;
                moonLight.intensity = 1.5; // ADDED: Lighting source from top
            }
        }

        let lastTime = performance.now();
        function animate() {
            requestAnimationFrame(animate); const timeNow = performance.now();
            let rawDt = Math.min((timeNow - lastTime) / 1000, 0.1) * state.timeScale; lastTime = timeNow;
            let remainingDt = rawDt; while (remainingDt > 0) { let step = Math.min(remainingDt, 0.016); physicsStep(step); remainingDt -= step; }

            if (state.weather === 'blizzard') {
                const posArr = snowGeo.attributes.position.array;
                const area = 120;
                const fallSpeed = 5 * rawDt; // REFINED: Decreased falling speed by 2x
                for(let i=0; i<snowPtsCount; i++) {
                    posArr[i*3+1] -= fallSpeed; 
                    if (posArr[i*3+1] < -area/2) posArr[i*3+1] = area/2;
                }
                snowGeo.attributes.position.needsUpdate = true;
                snowSystem.position.copy(camera.position); 
            }
            
            // Top-down lighting logic
            if (state.weather !== 'normal') {
                moonLight.position.set(state.position.x, state.position.y + 25, state.position.z);
            }

            if (state.autoWindActive) {
                state.wind.x += state.autoWindDir * 10 * rawDt; if (Math.abs(state.wind.x) >= 20) state.autoWindDir *= -1;
                document.getElementById('param-windx').value = state.wind.x; document.getElementById('val-windx').innerText = state.wind.x.toFixed(1);
            }

            if (state.shapeShifterActive && timeNow - state.lastShapeChange > 3000) {
                state.currentShapeIndex = (state.currentShapeIndex + 1) % SHAPE_NAMES.length; state.lastShapeChange = timeNow;
                document.getElementById('param-shape').value = state.currentShapeIndex; document.getElementById('val-shape').innerText = SHAPE_NAMES[state.currentShapeIndex];
                updateCanopyShape(state.currentShapeIndex); 
            }

            if (state.paletteAutoActive && timeNow - state.lastPaletteChange > 4000) {
                const keys = Object.keys(PALETTES); state.currentPaletteIndex = (state.currentPaletteIndex + 1) % keys.length; state.lastPaletteChange = timeNow;
                const p = keys[state.currentPaletteIndex]; document.getElementById('param-palette').value = p; canopyMat.map = generateStripedTexture(p); updatePalettePreview(p);
            }

            state.camShakeSmooth = THREE.MathUtils.lerp(state.camShakeSmooth, state.camShakeIntensity, 0.1);
            const groundY = Math.max(getTerrainHeight(state.position.x, state.position.z), WATER_LEVEL);
            const bottomOffset = Math.abs(heartMesh.position.y);
            const trueAltitude = Math.max(0, (state.position.y - bottomOffset) - groundY);
            let heightFade = trueAltitude < CONFIG.turbulenceHeightLimit ? trueAltitude / CONFIG.turbulenceHeightLimit : 1.0;
            if (state.phase === 'LANDED') heightFade = 0;

            if (state.camTurbulenceActive && state.phase !== 'LANDED') {
                const intensityNorm = state.camShakeSmooth / 10.0;
                const freqBase = 0.8 + (intensityNorm * 0.9);
                state.turbulencePhase += rawDt * freqBase;
                const baseRadius = 0.4 + intensityNorm * 1.5;
                const totalRadius = Math.min(4.5, (baseRadius + Math.pow(intensityNorm, 4) * 2.5)) * heightFade;
                state.objTurbulenceOffset.x = Math.sin(state.turbulencePhase) * totalRadius;
                state.objTurbulenceOffset.y = Math.cos(state.turbulencePhase * 0.7) * (totalRadius * 0.25);
                state.objTurbulenceOffset.z = Math.cos(state.turbulencePhase * 1.1) * totalRadius;
                const tiltWeight = Math.pow(intensityNorm, 2) * 0.2;
                state.objTurbulenceRot.x = Math.sin(state.turbulencePhase) * tiltWeight;
                state.objTurbulenceRot.z = Math.cos(state.turbulencePhase * 0.9) * tiltWeight;
            } else {
                state.objTurbulenceOffset.lerp(new THREE.Vector3(0,0,0), 0.05);
                state.objTurbulenceRot.x *= 0.95; state.objTurbulenceRot.z *= 0.95;
            }

            const threshold = 9.2;
            const targetSaltoAlpha = (state.camShakeSmooth >= threshold) ? Math.min(1.0, (state.camShakeSmooth - threshold) / (10.0 - threshold)) : 0;
            state.currentSaltoAlpha = THREE.MathUtils.lerp(state.currentSaltoAlpha, targetSaltoAlpha, 0.02);
            if (state.currentSaltoAlpha > 0.001 && state.phase !== 'LANDED') {
                state.saltoPhase += rawDt * (state.velocity.length() * 0.15) * state.currentSaltoAlpha;
                playerGroup.rotation.x = Math.sin(state.saltoPhase) * Math.PI * 2 * state.currentSaltoAlpha;
            } else { playerGroup.rotation.x = THREE.MathUtils.lerp(playerGroup.rotation.x, 0, 0.05); }

            playerGroup.position.copy(state.position).add(state.objTurbulenceOffset);
            heartMesh.rotation.set(Math.PI + (state.velocity.z * 0.02) + state.objTurbulenceRot.x, (state.velocity.x * 0.02), Math.PI + state.objTurbulenceRot.z);
            if(state.phase === 'DEPLOYED' || state.phase === 'DEPLOYING') {
                canopyMesh.rotation.set(state.velocity.z * 0.015 + state.objTurbulenceRot.x * 0.5, 0, -state.velocity.x * 0.015 + state.objTurbulenceRot.z * 0.5);
            }
            updateStrings();

            if (state.camRotationActive) state.camTheta += rawDt * state.camRotationSpeed;
            const relX = state.camDistance * Math.sin(state.camPhi) * Math.sin(state.camTheta);
            const relY = state.camDistance * Math.cos(state.camPhi);
            const relZ = state.camDistance * Math.sin(state.camPhi) * Math.cos(state.camTheta);
            camera.position.set(state.position.x + relX, state.position.y + relY, state.position.z + relZ);
            camera.lookAt(state.position);

            document.getElementById('hud-alt').innerText = trueAltitude.toFixed(1) + ' m';
            document.getElementById('hud-speed').innerText = (state.velocity.length() * 3.6).toFixed(1) + ' km/h';
            document.getElementById('hud-vz').innerText = Math.abs(state.velocity.y).toFixed(1) + ' m/s';
            renderer.render(scene, camera);
        }

        function updateHUDState() { const el = document.getElementById('hud-state'); el.innerText = state.phase; el.className = 'stat-value status-' + state.phase; }
        function resetSimulation() {
            state.phase = 'FREEFALL'; state.position.set(0, CONFIG.startAltitude, 0); state.velocity.set(0, 0, 0); state.deployProgress = 0;
            state.saltoPhase = 0; state.currentSaltoAlpha = 0; playerGroup.rotation.x = 0;
            canopyMesh.scale.setScalar(0.0001); canopyMesh.visible = false; stringLines.visible = false;
            updateHeartScale(); updateHUDState();
        }
        function updateHeartScale() { const finalScale = 1.5 * Math.pow(state.mass / CONFIG.baseMass, 0.33); heartMesh.scale.setScalar(finalScale); heartMesh.position.y = -1.8 * finalScale; }

        function handleDragStart(x, y, target) { if (target.closest('.panel')) return; state.isDragging = true; state.lastMousePos = { x, y }; }
        function handleDragMove(x, y) { if (!state.isDragging) return; state.camTheta -= (x - state.lastMousePos.x) * 0.01;
            state.camPhi = Math.max(0.1, Math.min(Math.PI - 0.1, state.camPhi - (y - state.lastMousePos.y) * 0.01)); state.lastMousePos = { x, y }; }

        window.addEventListener('mousedown', (e) => handleDragStart(e.clientX, e.clientY, e.target));
        window.addEventListener('touchstart', (e) => handleDragStart(e.touches[0].clientX, e.touches[0].clientY, e.target));
        window.addEventListener('mouseup', () => state.isDragging = false);
        window.addEventListener('touchend', () => state.isDragging = false);
        window.addEventListener('mousemove', (e) => handleDragMove(e.clientX, e.clientY));
        window.addEventListener('touchmove', (e) => { handleDragMove(e.touches[0].clientX, e.touches[0].clientY); if (state.isDragging) e.preventDefault(); }, { passive: false });
        window.addEventListener('wheel', (e) => state.camDistance = Math.max(5, Math.min(100, state.camDistance + e.deltaY * 0.05)));

        document.getElementById('param-mass').oninput = (e) => { state.mass = +e.target.value; document.getElementById('val-mass').innerText = state.mass; updateHeartScale(); };
        document.getElementById('param-deploy').oninput = (e) => { state.deployAltitude = +e.target.value; document.getElementById('val-deploy').innerText = state.deployAltitude; };
        document.getElementById('param-windx').oninput = (e) => { state.wind.x = +e.target.value; document.getElementById('val-windx').innerText = state.wind.x.toFixed(1); };
        document.getElementById('param-auto-wind').onchange = (e) => state.autoWindActive = e.target.checked;
        document.getElementById('param-time').oninput = (e) => { state.timeScale = +e.target.value; document.getElementById('val-time').innerText = state.timeScale.toFixed(1) + 'x'; };
        document.getElementById('cam-auto-rotate').onchange = (e) => state.camRotationActive = e.target.checked;
        document.getElementById('param-rot-speed').oninput = (e) => { state.camRotationSpeed = +e.target.value; document.getElementById('val-rot-speed').innerText = state.camRotationSpeed.toFixed(2); };
        document.getElementById('cam-turbulence').onchange = (e) => state.camTurbulenceActive = e.target.checked;
        document.getElementById('param-shake').oninput = (e) => { 
            state.camShakeIntensity = +e.target.value; 
            const valDisplay = document.getElementById('val-shake');
            const lblTurbulence = document.getElementById('lbl-turbulence');
            valDisplay.innerText = state.camShakeIntensity.toFixed(1); 
            if (state.camShakeIntensity >= 9.2) { valDisplay.classList.add('warning'); lblTurbulence.innerHTML = "🌀 Hard Landing!"; lblTurbulence.classList.add('heavy'); } 
            else { valDisplay.classList.remove('warning'); lblTurbulence.innerText = "Turbulence"; lblTurbulence.classList.remove('heavy'); }
        };
        document.getElementById('btn-reset-cam').onclick = () => { state.camPhi = Math.PI/3; state.camTheta = 0; state.camDistance = 25; };
        document.getElementById('btn-restart').onclick = resetSimulation;
        document.getElementById('param-shifter').onchange = (e) => { state.shapeShifterActive = e.target.checked; if (state.shapeShifterActive) state.lastShapeChange = performance.now(); };
        document.getElementById('param-palette-auto').onchange = (e) => { state.paletteAutoActive = e.target.checked; if (state.paletteAutoActive) state.lastPaletteChange = performance.now(); };
        document.getElementById('param-shape').oninput = (e) => { const idx = parseInt(e.target.value); state.currentShapeIndex = idx; document.getElementById('val-shape').innerText = SHAPE_NAMES[idx]; updateCanopyShape(idx); };
        document.getElementById('param-palette').onchange = (e) => { const v = e.target.value; canopyMat.map = generateStripedTexture(v); updatePalettePreview(v); state.currentPaletteIndex = Object.keys(PALETTES).indexOf(v); };

        function updatePalettePreview(p) {
            const el = document.getElementById('palette-preview'); el.innerHTML = '';
            PALETTES[p].forEach(c => { const s = document.createElement('span'); s.className = 'palette-color'; s.style.backgroundColor = c; el.appendChild(s); });
        }

        window.onkeydown = (e) => { if(e.code==='ArrowUp'||e.code==='KeyW') state.keys.up=true; if(e.code==='ArrowDown'||e.code==='KeyS') state.keys.down=true; if(e.code==='ArrowLeft'||e.code==='KeyA') state.keys.left=true; if(e.code==='ArrowRight'||e.code==='KeyD') state.keys.right=true; };
        window.onkeyup = (e) => { if(e.code==='ArrowUp'||e.code==='KeyW') state.keys.up=false; if(e.code==='ArrowDown'||e.code==='KeyS') state.keys.down=false; if(e.code==='ArrowLeft'||e.code==='KeyA') state.keys.left=false; if(e.code==='ArrowRight'||e.code==='KeyD') state.keys.right=false; };
        window.onresize = () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); };
        window.onload = () => { updateHeartScale(); updatePalettePreview('paired12'); animate(); };
    </script>
</body>
</html>
